{% load widget_tweaks %}
{% block form %}

<div id="msg-salida"></div>

<form id="salidaForm" method="post" action="{% url 'apy:salida_vehiculo_modal_crear' %}">
    {% csrf_token %}

    <div class="form-group mb-3">
        <label>Fecha de salida:</label>
        {{ form.fecha_salida|add_class:'form-control' }}
    </div>

    <div class="form-group mb-3">
        <label>Hora de salida:</label>
        {{ form.hora_salida|add_class:'form-control' }}
    </div>

</form>
{% endblock %}
