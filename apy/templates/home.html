    <script>
    // === Configuración global de CSRF ===
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
            const cookies = document.cookie.split(";");
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + "=")) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    const csrftoken = getCookie("csrftoken");
    $.ajaxSetup({
        headers: { "X-CSRFToken": csrftoken }
    });
    </script>

    <script>
/* ✅ Evita duplicar eventos (clave del arreglo) */
$(document).off('click', '#btnGuardarCliente').on('click', '#btnGuardarCliente', function(e) {
    e.preventDefault();

    const $btn = $(this);
    const $modal = $('#modal-id_cliente');
    const $form = $modal.find('form#clienteForm');

    if (!$form.length) {
        console.error('No se encontró el formulario #clienteForm dentro del modal.');
        return;
    }

    const url = $form.attr('action');
    const formData = new FormData($form[0]);

    $btn.prop('disabled', true).addClass('disabled').text('Guardando...');

    $.ajax({
        url: url,
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        success: function(data) {
            if (data.success) {
                // Mensaje de éxito
                const $msg = $modal.find('#msg-cliente');
                $msg.html('<div class="alert alert-success">' + data.message + '</div>');

                // Actualizar select en la página principal
                const $select = $('#id_id_cliente');
                if ($select.find('option[value="' + data.id + '"]').length === 0) {
                    const option = new Option(data.text, data.id, true, true);
                    $select.append(option).val(data.id).trigger('change');
                } else {
                    $select.val(data.id).trigger('change');
                }

                // Cerrar el modal correctamente
                $modal.modal('hide');
                $modal.modal('hide');
                $('body').removeClass('modal-open');
                $('body').css('padding-right', '');
                $('.modal-backdrop').remove();
                $modal.removeClass('show');
                $modal.css('display', 'none');
            } else {
                if (data.html) {
                    $modal.find('.modal-body').html(data.html);
                } else {
                    $modal.find('#msg-cliente').html('<div class="alert alert-danger">' + data.message + '</div>');
                }
            }
        },
        error: function(xhr, status, err) {
            const $msg = $modal.find('#msg-cliente');
            $msg.html('<div class="alert alert-danger">Error en el servidor. Revisa consola.</div>');
            console.error('AJAX error:', status, err);
        },
        complete: function() {
            $btn.prop('disabled', false).removeClass('disabled').text('Agregar');
        }
    });
});

/* ✅ Limpiar el formulario y mensajes al cerrar */
$('#modal-id_cliente').on('hidden.bs.modal', function() {
    const $form = $(this).find('form#clienteForm')[0];
    if ($form) $form.reset();
    $(this).find('#msg-cliente').html('');
});
</script>
