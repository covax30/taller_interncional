    <script>
    // === Configuración global de CSRF ===
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
            const cookies = document.cookie.split(";");
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + "=")) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    const csrftoken = getCookie("csrftoken");
    $.ajaxSetup({
        headers: { "X-CSRFToken": csrftoken }
    });
    </script>

<script>
function initSelect2EnModal($modal) {
    $(document).off('focusin.select2');
    $modal.find('select').each(function() {
        var $select = $(this);
        if ($select.data('select2')) {
            $select.select2('destroy');
        }
        $select.select2({
            theme: 'bootstrap-5',
            width: '100%',
            dropdownParent: $modal
        });
        $select.removeAttr('aria-hidden');
    });
    console.log('✓ Select2 inicializado en:', $modal.attr('id'));
}
</script>

// ✅ GUARDAR VEHÍCULO - delegado desde document para funcionar con HTML dinámico
$(document).off('click', '#btnGuardarVehiculo').on('click', '#btnGuardarVehiculo', function(e) {
    e.preventDefault();
    e.stopPropagation();

    var $btn    = $(this);
    var $modal  = $('#modal-id_vehiculo');
    var $form   = $modal.find('#vehiculoForm');
    var $msgBox = $modal.find('#msg-vehiculo');
    var formData = new FormData($form[0]);

    $btn.prop('disabled', true).html('<span class="spinner-border spinner-border-sm"></span> Guardando...');

    $.ajax({
        url: $form.attr('action'),
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        headers: { 'X-Requested-With': 'XMLHttpRequest' },

        success: function(response) {
            if (response.success) {
                $msgBox.html('<div class="alert alert-success">' + response.message + '</div>');

                var $selClienteModal = $form.find('select[name="id_cliente"]');
                var clienteId    = $selClienteModal.val();
                var clienteTexto = $selClienteModal.find('option:selected').text();

                $(document).trigger('vehiculoCreado', [{
                    id:            response.id,
                    text:          response.text,
                    cliente_id:    clienteId,
                    cliente_texto: clienteTexto
                }]);

                setTimeout(function() {
                    $modal.modal('hide');
                    $('body').removeClass('modal-open');
                    $('body').css('padding-right', '');
                    $('.modal-backdrop').remove();
                }, 800);

            } else {
                if (response.html) {
                    $modal.find('.modal-body').html(response.html);
                    // Reinicializar select2
                    $modal.find('select').each(function() {
                        if (!$(this).data('select2')) {
                            $(this).select2({ theme: 'bootstrap-5', width: '100%', dropdownParent: $modal });
                        }
                    });
                    setTimeout(function() {
                        $modal.find('.select2-container').css('width', '100%');
                    }, 50);
                } else {
                    $msgBox.html('<div class="alert alert-danger">' + (response.message || 'Error al crear vehículo') + '</div>');
                }
            }
        },

        error: function(xhr) {
            try {
                var resp = JSON.parse(xhr.responseText);
                if (resp.html) {
                    $modal.find('.modal-body').html(resp.html);
                    $modal.find('select').each(function() {
                        if (!$(this).data('select2')) {
                            $(this).select2({ theme: 'bootstrap-5', width: '100%', dropdownParent: $modal });
                        }
                    });
                    setTimeout(function() {
                        $modal.find('.select2-container').css('width', '100%');
                    }, 50);
                } else {
                    $msgBox.html('<div class="alert alert-danger">' + (resp.message || 'Error en el servidor.') + '</div>');
                }
            } catch(err) {
                $msgBox.html('<div class="alert alert-danger">Error en el servidor.</div>');
            }
        },

        complete: function() {
            $btn.prop('disabled', false).html('<i class="fas fa-save"></i> Agregar');
        }
    });
});
</script>

    <script>
/* ✅ Evita duplicar eventos (clave del arreglo) */
$(document).off('click', '#btnGuardarCliente').on('click', '#btnGuardarCliente', function(e) {
    e.preventDefault();

    const $btn = $(this);
    const $modal = $('#modal-id_cliente');
    const $form = $modal.find('form#clienteForm');

    if (!$form.length) {
        console.error('No se encontró el formulario #clienteForm dentro del modal.');
        return;
    }

    const url = $form.attr('action');
    const formData = new FormData($form[0]);

    $btn.prop('disabled', true).addClass('disabled').text('Guardando...');

    $.ajax({
        url: url,
        type: 'POST',
        data: formData,
        processData: false,
        contentType: false,
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        success: function(data) {
            if (data.success) {
                // Mensaje de éxito
                const $msg = $modal.find('#msg-cliente');
                $msg.html('<div class="alert alert-success">' + data.message + '</div>');

                // Actualizar select en la página principal
                const $select = $('#id_id_cliente');
                if ($select.find('option[value="' + data.id + '"]').length === 0) {
                    const option = new Option(data.text, data.id, true, true);
                    $select.append(option).val(data.id).trigger('change');
                } else {
                    $select.val(data.id).trigger('change');
                }

                // Cerrar el modal correctamente
                $modal.modal('hide');
                $modal.modal('hide');
                $('body').removeClass('modal-open');
                $('body').css('padding-right', '');
                $('.modal-backdrop').remove();
                $modal.removeClass('show');
                $modal.css('display', 'none');
            } else {
                if (data.html) {
                    $modal.find('.modal-body').html(data.html);
                } else {
                    $modal.find('#msg-cliente').html('<div class="alert alert-danger">' + data.message + '</div>');
                }
            }
        },
        error: function(xhr, status, err) {
            const $msg = $modal.find('#msg-cliente');
            $msg.html('<div class="alert alert-danger">Error en el servidor. Revisa consola.</div>');
            console.error('AJAX error:', status, err);
        },
        complete: function() {
            $btn.prop('disabled', false).removeClass('disabled').text('Agregar');
        }
    });
});

/* ✅ Limpiar el formulario y mensajes al cerrar */
$('#modal-id_cliente').on('hidden.bs.modal', function() {
    const $form = $(this).find('form#clienteForm')[0];
    if ($form) $form.reset();
    $(this).find('#msg-cliente').html('');
});
</script>

        var $selCliente = $modal.find('#id_id_cliente');

        console.log('Select encontrado:', $selCliente.length);

        if ($selCliente.length) {
            // Destruir Select2, agregar opción, reinicializar
            if ($selCliente.data('select2')) {
                $selCliente.select2('destroy');
            }

            // Agregar opción si no existe
            if ($selCliente.find('option[value="' + nuevoCliente.id + '"]').length === 0) {
                $selCliente.append(new Option(nuevoCliente.text, nuevoCliente.id, true, true));
            }

            $selCliente.val(nuevoCliente.id);

            // Reinicializar Select2
            $selCliente.select2({
                theme: 'bootstrap-5',
                width: '100%',
                dropdownParent: $modal
            });

            $selCliente.trigger('change');
            console.log('✅ Cliente autoseleccionado en modal vehículo:', nuevoCliente.id);
        }
    }
});
</script>

</body>

</html>
