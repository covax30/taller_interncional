{% extends 'home.html' %}
{% load static %}

{% block body %}
    <!--begin::App Wrapper-->
    <div class="app-wrapper">
      <!--begin::Header-->
      <!--end::Header-->
      
      <!--begin::Sidebar-->
      {% block sidebar %}
      {% include 'sidebar.html' %}
      {% endblock sidebar %} 
      <!--end::Sidebar-->
      
      <!--begin::Main Content-->
      {% block content %}{% endblock %}
      <!--end::Main Content-->
      
      <!--begin::Footer-->
      <!--end::Footer-->
    </div>
    <!--end::App Wrapper-->

    <!--begin::Scripts-->
    
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        {% if messages %}
          {% for message in messages %}
            Swal.fire({
              title: "{% if message.tags == 'success' %}¡Éxito!{% elif message.tags == 'error' %}¡Error!{% else %}Aviso{% endif %}",
              text: "{{ message }}",
              icon: "{{ message.tags }}", // Usa success, error, info, warning
              timer: 3000,
              showConfirmButton: false,
              confirmButtonColor: '#1e4d2b',
              timerProgressBar: true,
            });
          {% endfor %}
        {% endif %}
      });
    </script>

    <!--begin::OverlayScrollbars Configure-->
    <script>
      const SELECTOR_SIDEBAR_WRAPPER = '.sidebar-wrapper';
      const Default = {
        scrollbarTheme: 'os-theme-light',
        scrollbarAutoHide: 'leave',
        scrollbarClickScroll: true,
      };
      document.addEventListener('DOMContentLoaded', function () {
        const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
        const isMobile = window.innerWidth <= 992;

        if (
          sidebarWrapper &&
          window.OverlayScrollbarsGlobal?.OverlayScrollbars !== undefined &&
          !isMobile
        ) {
          window.OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
            scrollbars: {
              theme: Default.scrollbarTheme,
              autoHide: Default.scrollbarAutoHide,
              clickScroll: Default.scrollbarClickScroll,
            },
          });
        }
      });
    </script>

    <script>
    window.addEventListener('pageshow', function(event) {
        // Si la página se carga desde el caché del historial (botón atrás)
        if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
            // Forzamos recarga; como no hay sesión, Django los mandará al Login
            window.location.reload();
        }
    });
</script>
    <!--end::OverlayScrollbars Configure-->

    <!-- BLOQUE PARA SCRIPTS ADICIONALES DE PÁGINAS ESPECÍFICAS -->
     <script src="{% static 'lib/sweetalert2/sweetalert2.all.min.js' %}"></script>
    {% block extra_scripts %}
    {% endblock %}
    <script src="{% static 'AdminLTE/dist/js/theme_switcher.js' %}"> </script>
<script>
function confirmarSalida() {
    Swal.fire({
        title: '¿Cerrar sesión?',
        text: "Regresarás a la pantalla de ingreso.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#007bff',
        cancelButtonColor: '#dc3545',
        confirmButtonText: 'Sí, salir',
        cancelButtonText: 'Cancelar',
        reverseButtons: true
    }).then((result) => {
        if (result.isConfirmed) {
            const form = document.getElementById('logout-form-real');
            if (form) {
                // Forzamos el envío del formulario
                console.log("Enviando formulario a: " + form.action);
                form.submit();
            } else {
                alert("Error: No se encontró el formulario de salida.");
            }
        }
    });
}
</script>
