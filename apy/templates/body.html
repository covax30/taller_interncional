{% extends 'home.html' %}
{% load static %}

{% block body %}
    <!--begin::App Wrapper-->
    <div class="app-wrapper">
      <!--begin::Header-->
      <!--end::Header-->
      
      <!--begin::Sidebar-->
      {% block sidebar %}
      {% include 'sidebar.html' %}
      {% endblock sidebar %} 
      <!--end::Sidebar-->
      
      <!--begin::Main Content-->
      {% block content %}{% endblock %}
      <!--end::Main Content-->
      
      <!--begin::Footer-->
      <!--end::Footer-->
    </div>
    <!--end::App Wrapper-->

    <!--begin::Scripts-->
    <script src="{% static 'lib/sweetalert2/sweetalert2.all.min.js' %}"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        {% if messages %}
          {% for message in messages %}
            Swal.fire({
              title: "{% if message.tags == 'success' %}¡Éxito!{% elif message.tags == 'error' %}¡Error!{% else %}Aviso{% endif %}",
              text: "{{ message }}",
              icon: "{{ message.tags }}", // Usa success, error, info, warning
              timer: 3000,
              showConfirmButton: false,
              confirmButtonColor: '#1e4d2b',
              timerProgressBar: true,
            });
          {% endfor %}
        {% endif %}
      });
    </script>

    <!--begin::OverlayScrollbars Configure-->
    <script>
      const SELECTOR_SIDEBAR_WRAPPER = '.sidebar-wrapper';
      const Default = {
        scrollbarTheme: 'os-theme-light',
        scrollbarAutoHide: 'leave',
        scrollbarClickScroll: true,
      };
      document.addEventListener('DOMContentLoaded', function () {
        const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
        const isMobile = window.innerWidth <= 992;

        if (
          sidebarWrapper &&
          window.OverlayScrollbarsGlobal?.OverlayScrollbars !== undefined &&
          !isMobile
        ) {
          window.OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
            scrollbars: {
              theme: Default.scrollbarTheme,
              autoHide: Default.scrollbarAutoHide,
              clickScroll: Default.scrollbarClickScroll,
            },
          });
        }
      });
    </script>
    <!--end::OverlayScrollbars Configure-->

    <!-- BLOQUE PARA SCRIPTS ADICIONALES DE PÁGINAS ESPECÍFICAS -->
    {% block extra_scripts %}
    {% endblock %}
    <script src="{% static 'AdminLTE/dist/js/theme_switcher.js' %}"> </script>
{% endblock %}
