{% extends 'body.html' %}
{% load static %}
{% block content %}

<div class="main-content" style="padding: 20px; padding-top: 70px; padding-bottom: 80px; width: 100%">
  <div class="col-md-12">
    <div class="card card-default">
      <div class="card-header">
        <h3 class="card-title">
          {% block titulo %}
          {% endblock titulo %}
        </h3>
      </div>
      <div class="card-body">
        <div class="card-footer">
          {% block agregar %}
          {% endblock %}
        </div>
        <table id="example1" class="table table-bordered table-striped" responsive="true">
          <thead>
            <tr>
              {% block columnas %}
              {% endblock %}
            </tr>
          </thead>
          <tbody id="tablaFacturas">
            {% block iterar %}
            {% endblock %}
          </tbody>
        </table>

        <style>
  /* =======================================================
     SOLUCIÓN: SINCRONIZACIÓN DE DATATABLES CON TEMA OSCURO
     ======================================================= */
  
  /* Sobrescribe los colores de texto cuando el tema oscuro está activo */
  html[data-bs-theme="dark"] .dataTables_wrapper .dataTables_length,
  html[data-bs-theme="dark"] .dataTables_wrapper .dataTables_filter,
  html[data-bs-theme="dark"] .dataTables_wrapper .dataTables_info,
  html[data-bs-theme="dark"] .dataTables_wrapper .dataTables_processing,
  html[data-bs-theme="dark"] .dataTables_wrapper .dataTables_paginate,
  html[data-bs-theme="dark"] .dataTable { /* Añadido también para el texto dentro de las celdas */
      color: #c2c7d0 !important; /* Texto claro de AdminLTE Dark */
  }

  /* Sobrescribe el color del campo de búsqueda a blanco en tema oscuro */
  html[data-bs-theme="dark"] .dataTables_filter input {
      background-color: #343a40 !important; /* Fondo oscuro de AdminLTE */
      color: #c2c7d0 !important;            /* Texto claro */
      border-color: #454d55 !important;
  }



  /* =======================================================
   ESTILOS PARA DATATABLES (CLARO + OSCURO)
   ======================================================= */

/* 🎨 Modo claro (por defecto) */
.dataTables_filter input,
.dataTables_wrapper select,
.dataTables_wrapper input {
  background-color: #fff !important;
  color: #212529 !important;
  border: 1px solid #ced4da !important;
}

/* 🌑 Modo oscuro */
html[data-bs-theme="dark"] .dataTables_wrapper .dataTables_length,
html[data-bs-theme="dark"] .dataTables_wrapper .dataTables_filter,
html[data-bs-theme="dark"] .dataTables_wrapper .dataTables_info,
html[data-bs-theme="dark"] .dataTables_wrapper .dataTables_processing,
html[data-bs-theme="dark"] .dataTables_wrapper .dataTables_paginate,
html[data-bs-theme="dark"] .dataTable {
  color: #c2c7d0 !important;
}

html[data-bs-theme="dark"] .dataTables_filter input,
html[data-bs-theme="dark"] .dataTables_wrapper select,
html[data-bs-theme="dark"] .dataTables_wrapper input {
  background-color: #343a40 !important;
  color: #c2c7d0 !important;
  border-color: #454d55 !important;
}

/* Inputs por columna */
#example1 thead input {
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 13px;
}

/* Centrar encabezados */
#example1 thead th {
  text-align: center;
  vertical-align: middle;
}

/* Alineación del buscador de la tabla */
.dataTables_filter {
    margin-top: 10px; /* Separación de los botones */
}

.dataTables_filter label {
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
}

/* Ajuste del input de búsqueda */
.dataTables_filter input {
    width: 250px !important;
    border-radius: 20px !important; /* Estilo redondeado más moderno */
    padding: 5px 15px !important;
}

/* Quitamos el margen por defecto de los botones de Datatables para controlarlo nosotros */
.dt-buttons {
    margin-bottom: 0 !important;
}

        </style>
      </div>
    </div>
  </div>
</div>

<!-- JS de Sienna Accessibility -->
<script src="{% static 'js/sienna-accessibility/sienna.js' %}"></script>
<script src="{% static 'js/sienna-accessibility/custom.js' %}"></script>
<!-- ================== LIBRERÍAS CSS ================== -->



<!-- ================== SCRIPTS PARA FILTROS EN COLUMNAS ================== -->
<script>
$(document).ready(function() {
  var table = $('#example1').DataTable({
      responsive: true,
      autoWidth: false,
      orderCellsTop: true,
      fixedHeader: true,
      // === AGREGAMOS ESTAS DOS LÍNEAS PARA LOS BOTONES ===
      "dom": '<"row align-items-center mb-3"<"col-md-6"l><"col-md-6 d-flex flex-column align-items-end"Bf>>rtip',
      buttons: [
          
          {
              extend: 'excelHtml5',
              text: '<i class="fas fa-file-excel"></i> Excel',
              className: 'btn btn-success btn-sm shadow-sm',
              exportOptions: { columns: ':not(:last-child)' } // No exporta la columna de acciones
          },
          {
              extend: 'pdfHtml5',
              text: '<i class="fas fa-file-pdf"></i> PDF',
              className: 'btn btn-danger btn-sm shadow-sm ms-2',
              exportOptions: { columns: ':not(:last-child)' }
          }
      ],
      language: {
          url: "../../../static/lenguajes/espanol.json"
      },
      initComplete: function () {
          var api = this.api();
          api.columns().every(function (colIdx) {
              var column = this;
              var th = $(column.header());
              var title = th.text().trim();

              if (title && title !== 'Acciones') {
                  th.html(`
                    <div style="display:flex; flex-direction:column; align-items:center;">
                      <span style="font-weight:600;">${title}</span>
                      <input type="text" placeholder="Buscar ${title}" style="width:100%; font-size:12px; margin-top:4px; border-radius:4px; padding:3px;">
                    </div>
                  `);
                  $('input', th).on('keyup change clear', function () {
                      if (column.search() !== this.value) {
                          column.search(this.value).draw();
                      }
                  });
              }
          });
      }
  });
});

</script>



<!-- 5. SWEETALERT2 -->
{% if messages %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  {% for message in messages %}
  Swal.fire({
    icon: '{% if "success" in message.tags %}success{% elif "error" in message.tags %}error{% else %}info{% endif %}',
    title: '{{ message|escapejs }}',
    timer: 2500,
    showConfirmButton: false
  });
  {% endfor %}
</script>
{% endif %}
